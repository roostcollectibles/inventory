<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULT — Collectibles Inventory</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--bg2:#161618;--bg3:#1e1e21;--bg4:#27272b;
  --border:#2e2e33;--border2:#3a3a40;
  --text:#f0f0f2;--text2:#9898a8;--text3:#5a5a6a;
  --accent:#e8f54e;--accent2:#c8d93e;
  --green:#22c55e;--amber:#f59e0b;--purple:#8b5cf6;--red:#ef4444;
  --radius:8px;--radius-lg:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
.mono{font-family:'DM Mono',monospace}
input,select,textarea,button{font-family:'Syne',sans-serif}

/* Auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-box{width:380px;padding:40px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg)}
.auth-logo{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.auth-logo span{color:var(--accent)}
.auth-sub{color:var(--text2);font-size:13px;margin-bottom:32px}
.auth-tabs{display:flex;margin-bottom:28px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;background:transparent;border:none;color:var(--text2);transition:all 0.15s}
.auth-tab.active{background:var(--accent);color:#0e0e0f}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:var(--bg3)}
.field textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--accent);color:#0e0e0f}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border2);background:var(--bg4)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-full{width:100%}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.err{color:var(--red);font-size:12px;margin-top:8px}
.success{color:var(--green);font-size:12px;margin-top:8px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;flex-shrink:0;position:sticky;top:0;height:100vh}
.sidebar-logo{padding:0 20px 24px;font-size:18px;font-weight:800;letter-spacing:-0.5px;border-bottom:1px solid var(--border);margin-bottom:20px}
.sidebar-logo span{color:var(--accent)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.15s;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--accent);background:var(--bg3);border-left-color:var(--accent)}
.sidebar-bottom{margin-top:auto;padding:20px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-bottom:12px;overflow:hidden}
.user-dot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0}
.user-email{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Main */
.main{flex:1;padding:32px;overflow-y:auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.page-title span{color:var(--text2);font-weight:400;font-size:14px;margin-left:8px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.stat-value{font-size:24px;font-weight:800;letter-spacing:-1px;font-family:'DM Mono',monospace}
.stat-value.green{color:var(--green)}
.stat-value.amber{color:var(--amber)}
.stat-value.purple{color:var(--purple)}
.stat-sub{font-size:12px;color:var(--text3);margin-top:4px;font-family:'DM Mono',monospace}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px 9px 36px;color:var(--text);font-size:13px;outline:none;transition:border 0.15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.filter-select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:13px;outline:none;cursor:pointer}

/* Grid */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;cursor:pointer;transition:all 0.15s}
.item-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.item-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.cat-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);background:var(--bg3);padding:3px 8px;border-radius:4px}
.status-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:3px 8px;border-radius:4px}
.item-title{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3}
.item-sub{font-size:12px;color:var(--text2);margin-bottom:14px}
.item-nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:14px;border-top:1px solid var(--border)}
.num-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px}
.num-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
.num-val.green{color:var(--green)}
.num-val.red{color:var(--red)}
.item-location{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);margin-top:10px;font-family:'DM Mono',monospace}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:580px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-size:16px;font-weight:800}
.modal-close{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;line-height:1}
.modal-body{padding:24px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.section-sep{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.check-field{display:flex;align-items:center;gap:8px;padding:10px 0}
.check-field input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.check-field label{font-size:14px;color:var(--text);cursor:pointer}

/* Detail */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-item{background:var(--bg3);border-radius:var(--radius);padding:14px}
.detail-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:4px}
.detail-value{font-size:14px;font-weight:600}
.detail-value.mono{font-family:'DM Mono',monospace}

/* Table */
.data-table{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-head{display:grid;padding:12px 16px;border-bottom:1px solid var(--border)}
.table-head span{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
.table-row{display:grid;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background 0.1s}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:var(--bg3)}
.inv-cols{grid-template-columns:2fr 1fr 1fr 1fr 1fr}
.profit-pos{color:var(--green);font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.profit-neg{color:var(--red);font-family:'DM Mono',monospace;font-size:13px;font-weight:600}

/* Packaging list */
.pkg-list{display:flex;flex-direction:column;gap:10px}
.pkg-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:12px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.pkg-row span{font-size:13px}
.pkg-name{font-weight:600}
.pkg-val{font-family:'DM Mono',monospace;color:var(--text2)}

/* Settings */
.settings-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px}
.settings-title{font-size:14px;font-weight:800;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:13px;font-weight:600}
.settings-sub{font-size:12px;color:var(--text2);margin-top:2px}
.settings-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;outline:none;width:140px;text-align:right}
.settings-input:focus{border-color:var(--accent)}

/* Empty */
.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--text2)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;gap:10px;color:var(--text2)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}

/* Cost breakdown pill */
.cost-pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:8px}
.cost-pill b{color:var(--text)}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="screen-loading" class="loading"><div class="spinner"></div> Loading...</div>

<!-- Auth -->
<div id="screen-auth" class="auth-wrap hidden">
  <div class="auth-box">
    <div class="auth-logo">VAULT<span>.</span></div>
    <div class="auth-sub">Collectibles inventory system</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="field"><label>Email</label><input type="email" id="auth-email" placeholder="you@email.com" /></div>
    <div class="field"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()" /></div>
    <div id="auth-err" class="err hidden"></div>
    <div id="auth-ok" class="success hidden"></div>
    <button class="btn btn-primary btn-full" style="margin-top:20px" id="auth-btn" onclick="doAuth()">Sign In</button>
  </div>
</div>

<!-- App -->
<div id="screen-app" class="app hidden">
  <div class="sidebar">
    <div class="sidebar-logo">VAULT<span>.</span></div>
    <div class="nav-item active" id="nav-dashboard" onclick="setPage('dashboard')">◈ Dashboard</div>
    <div class="nav-item" id="nav-inventory" onclick="setPage('inventory')">▦ Inventory</div>
    <div class="nav-item" id="nav-listed" onclick="setPage('listed')">◎ Listed</div>
    <div class="nav-item" id="nav-packaging" onclick="setPage('packaging')">⬡ Packaging</div>
    <div class="nav-item" id="nav-settings" onclick="setPage('settings')">⚙ Settings</div>
    <div class="sidebar-bottom">
      <div class="user-chip"><div class="user-dot"></div><div class="user-email" id="user-email-display"></div></div>
      <button class="btn btn-secondary btn-full" style="font-size:12px" onclick="signOut()">Sign Out</button>
    </div>
  </div>
  <div class="main">
    <div class="page-header">
      <div class="page-title" id="page-title-text">Dashboard</div>
      <div id="page-action"></div>
    </div>
    <div id="page-dashboard"></div>
    <div id="page-inventory" class="hidden"></div>
    <div id="page-listed" class="hidden"></div>
    <div id="page-packaging" class="hidden"></div>
    <div id="page-settings" class="hidden"></div>
  </div>
</div>

<!-- Item Form Modal -->
<div id="modal-form" class="overlay hidden" onclick="handleOverlayClick(event,'modal-form',closeForm)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="form-title">Add Item</div>
      <button class="modal-close" onclick="closeForm()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id" />
      <div class="form-row">
        <div class="field"><label>Category</label>
          <select id="f-category" onchange="renderCatFields()">
            <option value="trading_card">Trading Card</option>
            <option value="comic">Comic</option>
            <option value="video_game">Video Game</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field"><label>Status</label>
          <select id="f-status" onchange="toggleSoldFields()">
            <option value="in_stock">In Stock</option>
            <option value="listed">Listed</option>
            <option value="sold">Sold</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Title *</label><input id="f-title" placeholder="e.g. Batman #423 CGC 9.8" /></div>
      <div class="form-row">
        <div class="field"><label>Condition</label>
          <select id="f-condition">
            <option value="">Select...</option>
            <option>Mint</option><option>Near Mint</option><option>Excellent</option>
            <option>Very Good</option><option>Good</option><option>Fair</option><option>Poor</option>
          </select>
        </div>
        <div class="field"><label>Grade / Score</label><input id="f-grade" placeholder="e.g. 9.8, PSA 10" /></div>
      </div>

      <div class="section-sep">Financials</div>
      <div class="form-row">
        <div class="field"><label>Cost Paid ($)</label><input type="number" step="0.01" id="f-cost" placeholder="0.00" /></div>
        <div class="field"><label>Purchase Date</label><input type="date" id="f-purchase-date" /></div>
      </div>
      <div class="form-row">
        <div class="field"><label>List Price ($)</label><input type="number" step="0.01" id="f-sell-price" placeholder="0.00" /></div>
        <div class="field"><label>Market Value ($)</label><input type="number" step="0.01" id="f-market-value" placeholder="0.00" /></div>
      </div>
      <div id="sold-fields" class="hidden">
        <div class="section-sep">Sale Details</div>
        <div class="form-row">
          <div class="field"><label>Sold Price ($)</label><input type="number" step="0.01" id="f-sold-price" placeholder="0.00" /></div>
          <div class="field"><label>Sold Date</label><input type="date" id="f-sold-date" /></div>
        </div>
        <div class="form-row">
          <div class="field"><label>Marketplace</label>
            <select id="f-marketplace">
              <option value="ebay">eBay (13.5%)</option>
              <option value="tcgplayer">TCGplayer (10.25%)</option>
              <option value="custom">Other / Direct</option>
            </select>
          </div>
          <div class="field"><label>Custom Fee %</label><input type="number" step="0.01" id="f-custom-fee" placeholder="e.g. 5" /></div>
        </div>
      </div>

      <div class="section-sep">Location & Logistics</div>
      <div class="form-row">
        <div class="field"><label>Bin / Location</label><input id="f-location" placeholder="e.g. Bin A3, Shelf 2" /></div>
        <div class="field"><label>Packaging Size</label>
          <select id="f-packaging-size">
            <option value="">None</option>
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Misc Cost ($) <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">— extra costs for this item</span></label>
        <input type="number" step="0.01" id="f-misc-cost" placeholder="0.00" />
      </div>

      <div id="cat-fields-section" class="hidden">
        <div class="section-sep" id="cat-fields-label"></div>
        <div class="form-row" id="cat-fields-container"></div>
      </div>

      <div class="section-sep">Notes</div>
      <div class="field"><textarea id="f-notes" placeholder="Any additional notes..."></textarea></div>
      <div id="form-err" class="err hidden"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeForm()">Cancel</button>
      <button class="btn btn-primary" id="form-save-btn" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<!-- Item Detail Modal -->
<div id="modal-detail" class="overlay hidden" onclick="handleOverlayClick(event,'modal-detail',closeDetail)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span class="cat-badge" id="d-cat"></span>
          <span class="status-badge" id="d-status"></span>
        </div>
        <div class="modal-title" id="d-title"></div>
      </div>
      <button class="modal-close" onclick="closeDetail()">×</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid" id="d-grid"></div>
      <div id="d-cost-breakdown" class="hidden" style="margin-top:12px"></div>
      <div id="d-cat-section" class="hidden">
        <div class="section-sep" id="d-cat-label"></div>
        <div class="detail-grid" id="d-cat-grid"></div>
      </div>
      <div id="d-notes-section" class="hidden">
        <div class="section-sep">Notes</div>
        <div style="background:var(--bg3);border-radius:var(--radius);padding:14px;font-size:14px;line-height:1.6;color:var(--text2)" id="d-notes"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="deleteItem()">Delete</button>
      <button class="btn btn-secondary" onclick="closeDetail()">Close</button>
      <button class="btn btn-primary" onclick="editFromDetail()">Edit</button>
    </div>
  </div>
</div>

<!-- Packaging Form Modal -->
<div id="modal-pkg" class="overlay hidden" onclick="handleOverlayClick(event,'modal-pkg',closePkgForm)">
  <div class="modal" style="max-width:440px" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="pkg-form-title">Add Packaging</div>
      <button class="modal-close" onclick="closePkgForm()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pkg-f-id" />
      <div class="field"><label>Name</label><input id="pkg-f-name" placeholder="e.g. Bubble Mailer, Card Sleeve" /></div>
      <div class="form-row">
        <div class="field"><label>Unit Cost ($)</label><input type="number" step="0.01" id="pkg-f-cost" placeholder="0.00" /></div>
        <div class="field"><label>Quantity on Hand</label><input type="number" id="pkg-f-qty" placeholder="0" /></div>
      </div>
      <div class="field"><label>Notes</label><input id="pkg-f-notes" placeholder="Optional" /></div>
      <div id="pkg-err" class="err hidden"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closePkgForm()">Cancel</button>
      <button class="btn btn-primary" id="pkg-save-btn" onclick="savePkg()">Save</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vgqvrfzhpnrlevrmsvip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1mWj0RAlclCrZPkT5gn45w_XW08bQDm';

const PKG_SIZE_LABELS = {small:'Small',medium:'Medium',large:'Large'};

// Settings defaults
let settings = {
  pkg_small: 2.00,
  pkg_medium: 5.00,
  pkg_large: 10.00,
  default_marketplace: 'ebay'
};

let items = [];
let packaging = [];
let currentUser = null;
let currentPage = 'dashboard';
let detailItemId = null;
let editPkgId = null;
let authMode = 'login';

const fmt = n => (n != null && n !== '') ? '$' + Number(n).toFixed(2) : '—';
const fmtP = n => { if(n==null||isNaN(n)) return '—'; return (n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2); };
const show = id => document.getElementById(id).classList.remove('hidden');
const hide = id => document.getElementById(id).classList.add('hidden');
const val = id => document.getElementById(id).value;
const setVal = (id,v) => { const el = document.getElementById(id); if(el) el.value = v||''; };
const $ = id => document.getElementById(id);

function pkgCost(size) {
  if (!size) return 0;
  if (size === 'small') return settings.pkg_small;
  if (size === 'medium') return settings.pkg_medium;
  if (size === 'large') return settings.pkg_large;
  return 0;
}

function feePct(marketplace, customFee) {
  if (!marketplace) return MARKETPLACE_FEES[settings.default_marketplace] || 0.135;
  if (marketplace === 'custom') return (Number(customFee) || 0) / 100;
  return MARKETPLACE_FEES[marketplace] || 0;
}

function calcPL(item) {
  if (item.status !== 'sold') return null;
  const sold = Number(item.sold_price) || 0;
  const cost = Number(item.cost) || 0;
  const pkg = pkgCost(item.packaging_size);
  const misc = Number(item.misc_cost) || 0;
  const fee = feePct(item.marketplace, item.custom_fee);
  const feeAmt = sold * fee;
  return sold - cost - pkg - misc - feeAmt;
}

function calcEstProfit(item) {
  if (item.status === 'sold') return null;
  const market = Number(item.market_value);
  if (!market) return null;
  const cost = Number(item.cost) || 0;
  return market - cost;
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function switchTab(mode) {
  authMode = mode;
  $('tab-login').classList.toggle('active', mode==='login');
  $('tab-signup').classList.toggle('active', mode==='signup');
  $('auth-btn').textContent = mode==='login' ? 'Sign In' : 'Create Account';
  hide('auth-err'); hide('auth-ok');
}

async function doAuth() {
  const email = val('auth-email'), password = val('auth-password');
  $('auth-btn').disabled = true; $('auth-btn').textContent = '...';
  hide('auth-err'); hide('auth-ok');
  try {
    let res;
    if (authMode === 'login') {
      res = await db.auth.signInWithPassword({email, password});
    } else {
      res = await db.auth.signUp({email, password});
    }
    if (res.error) throw res.error;
    if (authMode === 'signup') {
      show('auth-ok'); $('auth-ok').textContent = 'Account created! You can now sign in.';
      switchTab('login');
    } else {
      currentUser = res.data.user;
      await loadApp();
    }
  } catch(e) {
    show('auth-err'); $('auth-err').textContent = e.message;
  } finally {
    $('auth-btn').disabled = false;
    $('auth-btn').textContent = authMode==='login' ? 'Sign In' : 'Create Account';
  }
}

async function signOut() {
  await db.auth.signOut();
  currentUser = null; items = []; packaging = [];
  hide('screen-app'); show('screen-auth');
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const { data } = await db.auth.getSession();
  hide('screen-loading');
  if (data.session?.user) { currentUser = data.session.user; await loadApp(); }
  else show('screen-auth');
}

async function loadApp() {
  hide('screen-auth'); show('screen-app');
  $('user-email-display').textContent = currentUser.email;
  loadSettings();
  await Promise.all([fetchItems(), fetchPackaging()]);
  setPage('dashboard');
}

function loadSettings() {
  try {
    const s = localStorage.getItem('vault_settings');
    if (s) settings = { ...settings, ...JSON.parse(s) };
  } catch(e) {}
}

function saveSettings() {
  localStorage.setItem('vault_settings', JSON.stringify(settings));
}

async function fetchItems() {
  const { data } = await db.from('inventory').select('*').order('created_at', {ascending:false});
  items = data || [];
}

async function fetchPackaging() {
  const { data } = await db.from('packaging').select('*').order('created_at', {ascending:false});
  packaging = data || [];
}

// ── Navigation ────────────────────────────────────────────────────────────────
function setPage(p) {
  currentPage = p;
  ['dashboard','inventory','listed','packaging','settings'].forEach(pg => {
    $('nav-'+pg).classList.toggle('active', pg===p);
    $('page-'+pg).classList.toggle('hidden', pg!==p);
  });
  const titles = {dashboard:'Dashboard',inventory:'Inventory',listed:'Listed',packaging:'Packaging',settings:'Settings'};
  const listed = items.filter(i=>i.status==='listed');
  const counts = {
    inventory:` <span style="color:var(--text2);font-weight:400;font-size:14px">${items.length} items</span>`,
    listed:` <span style="color:var(--text2);font-weight:400;font-size:14px">${listed.length} items</span>`,
    packaging:` <span style="color:var(--text2);font-weight:400;font-size:14px">${packaging.length} items</span>`
  };
  $('page-title-text').innerHTML = titles[p] + (counts[p]||'');

  const actions = {
    inventory:`<button class="btn btn-primary" onclick="openAddForm()">+ Add Item</button>`,
    listed:`<button class="btn btn-primary" onclick="openAddForm()">+ Add Item</button>`,
    packaging:`<button class="btn btn-primary" onclick="openPkgForm()">+ Add Packaging</button>`,
    dashboard:`<button class="btn btn-primary" onclick="openAddForm()">+ Add Item</button>`
  };
  $('page-action').innerHTML = actions[p] || '';

  if (p==='dashboard') renderDashboard();
  if (p==='inventory') renderInventory();
  if (p==='listed') renderListed();
  if (p==='packaging') renderPackaging();
  if (p==='settings') renderSettings();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const active = items.filter(i=>i.status!=='sold');
  const sold = items.filter(i=>i.status==='sold');
  const listed = items.filter(i=>i.status==='listed');
  const instock = items.filter(i=>i.status==='in_stock');
  const invested = active.reduce((s,i)=>s+(Number(i.cost)||0),0);
  const realized = sold.reduce((s,i)=>s+(calcPL(i)||0),0);
  const unrealized = active.reduce((s,i)=>s+(calcEstProfit(i)||0),0);

  const recent = [...items].slice(0,10);
  const rows = recent.map(item => {
    const sc = STATUS_STYLES[item.status]||{bg:'var(--bg3)',color:'var(--text2)',label:item.status};
    const pl = calcPL(item);
    const est = calcEstProfit(item);
    const showVal = item.status==='sold' ? pl : est;
    return `<div class="table-row inv-cols" onclick="viewItem('${item.id}')">
      <span style="font-weight:600;font-size:13px">${esc(item.title)}</span>
      <span style="font-size:12px;color:var(--text2)">${CAT_LABELS[item.category]||item.category}</span>
      <span><span class="status-badge" style="background:${sc.bg};color:${sc.color}">${sc.label}</span></span>
      <span class="mono" style="font-size:13px">${fmt(item.cost)}</span>
      <span class="${showVal==null?'mono':showVal>=0?'profit-pos':'profit-neg'}" style="${showVal==null?'color:var(--text3)':''}">${showVal==null?'—':fmtP(showVal)}</span>
    </div>`;
  }).join('');

  $('page-dashboard').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Items</div><div class="stat-value">${items.length}</div><div class="stat-sub">${instock.length} in stock · ${listed.length} listed · ${sold.length} sold</div></div>
      <div class="stat-card"><div class="stat-label">Capital Invested</div><div class="stat-value amber">${fmt(invested)}</div><div class="stat-sub">active inventory</div></div>
      <div class="stat-card"><div class="stat-label">Est. Profit</div><div class="stat-value ${unrealized>=0?'green':''}">${fmtP(unrealized)}</div><div class="stat-sub">market vs. cost basis</div></div>
      <div class="stat-card"><div class="stat-label">Realized P/L</div><div class="stat-value ${realized>=0?'green':''}">${fmtP(realized)}</div><div class="stat-sub">from ${sold.length} sold items</div></div>
    </div>
    <div style="margin-bottom:16px;font-weight:700;font-size:14px;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em">Recent Items</div>
    ${items.length===0 ? emptyState('📦','No items yet','Add your first item to get started') : `
    <div class="data-table">
      <div class="table-head inv-cols"><span>Item</span><span>Category</span><span>Status</span><span>Cost</span><span>P/L · Est.</span></div>
      ${rows}
    </div>`}`;
}

// ── Inventory ─────────────────────────────────────────────────────────────────
function renderInventory(search='', cat='all', status='all') {
  const filtered = items.filter(i => {
    const ms = !search || i.title.toLowerCase().includes(search.toLowerCase()) || (i.location||'').toLowerCase().includes(search.toLowerCase());
    const mc = cat==='all' || i.category===cat;
    const mst = status==='all' || i.status===status;
    return ms && mc && mst;
  });

  const cards = filtered.map(item => {
    const sc = STATUS_STYLES[item.status]||{bg:'var(--bg3)',color:'var(--text2)',label:item.status};
    const pl = calcPL(item);
    const est = calcEstProfit(item);
    const sub = [item.condition,item.grade].filter(Boolean).join(' · ') || '<span style="opacity:0.4">No grade</span>';
    const showPL = item.status === 'sold';
    const showEst = item.status !== 'sold';
    return `<div class="item-card" onclick="viewItem('${item.id}')">
      <div class="item-card-top">
        <span class="cat-badge">${CAT_LABELS[item.category]||item.category}</span>
        <span class="status-badge" style="background:${sc.bg};color:${sc.color}">${sc.label}</span>
      </div>
      <div class="item-title">${esc(item.title)}</div>
      <div class="item-sub">${sub}</div>
      <div class="item-nums">
        <div><div class="num-label">Cost</div><div class="num-val">${fmt(item.cost)}</div></div>
        <div><div class="num-label">${showPL?'P/L':'List'}</div><div class="num-val ${showPL?(pl>=0?'green':'red'):''}">${showPL?fmtP(pl):fmt(item.sell_price)}</div></div>
        <div><div class="num-label">Est.</div><div class="num-val ${showEst&&est!=null?(est>=0?'green':'red'):''}">${showEst&&est!=null?fmtP(est):'—'}</div></div>
      </div>
      ${item.location ? `<div class="item-location">📦 ${esc(item.location)}</div>` : ''}
    </div>`;
  }).join('');

  $('page-inventory').innerHTML = `
    <div class="filters">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input value="${esc(search)}" oninput="renderInventory(this.value,document.getElementById('inv-cat').value,document.getElementById('inv-status').value)" placeholder="Search by title or location..." />
      </div>
      <select id="inv-cat" class="filter-select" onchange="renderInventory(document.querySelector('.search-wrap input').value,this.value,document.getElementById('inv-status').value)">
        <option value="all">All Categories</option>
        <option value="trading_card">Trading Card</option><option value="comic">Comic</option>
        <option value="video_game">Video Game</option><option value="other">Other</option>
      </select>
      <select id="inv-status" class="filter-select" onchange="renderInventory(document.querySelector('.search-wrap input').value,document.getElementById('inv-cat').value,this.value)">
        <option value="all">All Statuses</option>
        <option value="in_stock">In Stock</option><option value="listed">Listed</option><option value="sold">Sold</option>
      </select>
    </div>
    ${filtered.length===0 ? emptyState('🔍','No items found','Try adjusting your filters') : `<div class="items-grid">${cards}</div>`}`;

  if (cat!=='all') $('inv-cat').value=cat;
  if (status!=='all') $('inv-status').value=status;
}

// ── Listed ────────────────────────────────────────────────────────────────────
function renderListed() {
  const listed = items.filter(i=>i.status==='listed');

  if (listed.length === 0) {
    $('page-listed').innerHTML = emptyState('◎','No listed items','Mark items as Listed to track projected profits here');
    return;
  }

  const totalProjected = listed.reduce((s,i)=>{
    const sp = Number(i.sell_price)||0;
    const cost = Number(i.cost)||0;
    const pkg = pkgCost(i.packaging_size);
    const misc = Number(i.misc_cost)||0;
    const fee = feePct(i.marketplace, i.custom_fee);
    return s + (sp - cost - pkg - misc - (sp*fee));
  },0);

  const cards = listed.map(item => {
    const sp = Number(item.sell_price)||0;
    const cost = Number(item.cost)||0;
    const pkg = pkgCost(item.packaging_size);
    const misc = Number(item.misc_cost)||0;
    const fee = feePct(item.marketplace, item.custom_fee);
    const feeAmt = sp * fee;
    const projected = sp - cost - pkg - misc - feeAmt;
    const sub = [item.condition, item.grade].filter(Boolean).join(' · ') || '<span style="opacity:0.4">No grade</span>';
    const mktLabel = MARKETPLACE_LABELS[item.marketplace||settings.default_marketplace]||'eBay';
    const feePctLabel = Math.round(fee*100*100)/100;
    return `<div class="item-card" onclick="viewItem('${item.id}')">
      <div class="item-card-top">
        <span class="cat-badge">${CAT_LABELS[item.category]||item.category}</span>
        <span class="status-badge" style="background:#2e2208;color:#f59e0b">Listed</span>
      </div>
      <div class="item-title">${esc(item.title)}</div>
      <div class="item-sub">${sub}</div>
      <div class="item-nums">
        <div><div class="num-label">List Price</div><div class="num-val">${fmt(sp)}</div></div>
        <div><div class="num-label">Cost</div><div class="num-val">${fmt(cost)}</div></div>
        <div><div class="num-label">Projected</div><div class="num-val ${projected>=0?'green':'red'}">${fmtP(projected)}</div></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">
        ${pkg?`<span class="cost-pill">Pkg <b>-${fmt(pkg)}</b></span>`:''}
        ${feeAmt?`<span class="cost-pill">${mktLabel} ${feePctLabel}% <b>-${fmt(feeAmt)}</b></span>`:''}
        ${misc?`<span class="cost-pill">Misc <b>-${fmt(misc)}</b></span>`:''}
      </div>
      ${item.location ? `<div class="item-location">📦 ${esc(item.location)}</div>` : ''}
    </div>`;
  }).join('');

  $('page-listed').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 24px;display:flex;gap:32px">
        <div><div class="stat-label" style="margin-bottom:4px">Items Listed</div><div style="font-size:22px;font-weight:800;font-family:'DM Mono',monospace">${listed.length}</div></div>
        <div style="width:1px;background:var(--border)"></div>
        <div><div class="stat-label" style="margin-bottom:4px">Total Projected</div><div style="font-size:22px;font-weight:800;font-family:'DM Mono',monospace;color:${totalProjected>=0?'var(--green)':'var(--red)'}">${fmtP(totalProjected)}</div></div>
        <div style="width:1px;background:var(--border)"></div>
        <div><div class="stat-label" style="margin-bottom:4px">After Fees &amp; Packaging</div><div style="font-size:13px;color:var(--text2);margin-top:4px">fees + pkg deducted per item</div></div>
      </div>
    </div>
    <div class="items-grid">${cards}</div>`;
}

      <div style="font-size:13px;color:var(--text2)">Total packaging value on hand: <span class="mono" style="color:var(--text)">${fmt(totalValue)}</span></div>

}

  setVal('f-cost', item.cost||'');

  setVal('f-sell-price', item.sell_price||'');
  setVal('f-market-value', item.market_value||'');
  setVal('f-status', item.status||'in_stock');
  setVal('f-location', item.location||'');
  setVal('f-packaging-size', item.packaging_size||'');
  setVal('f-misc-cost', item.misc_cost||'');
  setVal('f-marketplace', item.marketplace||settings.default_marketplace||'ebay');
  setVal('f-custom-fee', item.custom_fee||'');
  setVal('f-platform', item.platform||'');
  setVal('f-notes', item.notes||'');
  setVal('f-sold-price', item.sold_price||'');

  show('modal-form');
}

function closeForm() { hide('modal-form'); }

function toggleSoldFields() {
  val('f-status')==='sold' ? show('sold-fields') : hide('sold-fields');
}

function renderCatFields(existing={}) {
  const cat = val('f-category');
  const fields = CAT_FIELDS[cat]||[];
  if (!fields.length) { hide('cat-fields-section'); return; }
  $('cat-fields-label').textContent = (CAT_LABELS[cat]||cat) + ' Details';
  $('cat-fields-container').innerHTML = fields.map(f => {
    if (f.t==='bool') {
      return `<div class="check-field"><input type="checkbox" id="cf-${f.n}" ${existing[f.n]?'checked':''} /><label for="cf-${f.n}">${f.l}</label></div>`;
    }
    return `<div class="field"><label>${f.l}</label><input id="cf-${f.n}" value="${esc(existing[f.n]||'')}" /></div>`;
  }).join('');
  show('cat-fields-section');
}

async function saveItem() {
  const title = val('f-title').trim();
  if (!title) { show('form-err'); $('form-err').textContent='Title is required'; return; }
  hide('form-err');
  $('form-save-btn').disabled=true; $('form-save-btn').textContent='Saving...';

  const cat = val('f-category');
  const extra = {};
  (CAT_FIELDS[cat]||[]).forEach(f => {
    const el = $('cf-'+f.n);
    if (el) extra[f.n] = f.t==='bool' ? el.checked : el.value;
  });

  const payload = {
    user_id: currentUser.id, category:cat, title,
    condition: val('f-condition')||null, grade: val('f-grade')||null,
    cost: val('f-cost')||null, purchase_date: val('f-purchase-date')||null,
    sell_price: val('f-sell-price')||null, market_value: val('f-market-value')||null,
    status: val('f-status'), location: val('f-location')||null,
    packaging_size: val('f-packaging-size')||null,
    misc_cost: val('f-misc-cost')||null,
    marketplace: val('f-marketplace')||null,
    custom_fee: val('f-custom-fee')||null,
    notes: val('f-notes')||null,
    sold_price: val('f-sold-price')||null, sold_date: val('f-sold-date')||null,
    extra_fields: extra, barcode: null,
  };

  try {
    const id = val('f-id');
    let res;
    if (id) {
      res = await db.from('inventory').update(payload).eq('id',id).select().single();
    } else {
      res = await db.from('inventory').insert(payload).select().single();
    }
    if (res.error) throw res.error;
    items = id ? items.map(i=>i.id===id?res.data:i) : [res.data,...items];
    closeForm();
    if (currentPage==='dashboard') renderDashboard();
    else if (currentPage==='listed') renderListed();
    else renderInventory();
  } catch(e) {
    show('form-err'); $('form-err').textContent=e.message;
  } finally {
    $('form-save-btn').disabled=false; $('form-save-btn').textContent='Save Item';
  }
}

// ── Detail ────────────────────────────────────────────────────────────────────
function viewItem(id) {
  detailItemId = id;
  const item = items.find(i=>i.id===id);
  if (!item) return;
  const sc = STATUS_STYLES[item.status]||{bg:'var(--bg3)',color:'var(--text2)',label:item.status};
  $('d-cat').textContent = CAT_LABELS[item.category]||item.category;
  $('d-status').textContent = sc.label;
  $('d-status').style.background = sc.bg;
  $('d-status').style.color = sc.color;
  $('d-title').textContent = item.title;

  const pl = calcPL(item);
  const est = calcEstProfit(item);
  const pkgAmt = pkgCost(item.packaging_size);
  const miscAmt = Number(item.misc_cost)||0;
  const feeAmt = item.status==='sold' ? (Number(item.sold_price)||0)*feePct(item.marketplace,item.custom_fee) : 0;

  const dItems = [
    ['Cost Paid', fmt(item.cost), 'var(--text)'],
    ['List Price', fmt(item.sell_price), 'var(--text)'],
    ['Market Value', fmt(item.market_value), 'var(--text)'],
    item.status==='sold'
      ? ['Sold Price', fmt(item.sold_price), 'var(--text)']
      : ['Est. Profit', est!=null?fmtP(est):'—', est>=0?'var(--green)':'var(--red)'],
    item.status==='sold' ? ['P/L', fmtP(pl), pl>=0?'var(--green)':'var(--red)'] : null,
    item.condition ? ['Condition', item.condition, 'var(--text)'] : null,
    item.grade ? ['Grade', item.grade, 'var(--text)'] : null,
    item.location ? ['Location', item.location, 'var(--text)'] : null,
    item.packaging_size ? ['Packaging', PKG_SIZE_LABELS[item.packaging_size]+' ('+fmt(pkgAmt)+')', 'var(--text)'] : null,
    item.marketplace && item.status==='sold' ? ['Marketplace', (MARKETPLACE_LABELS[item.marketplace]||item.marketplace)+' fee: '+fmt(feeAmt), 'var(--text)'] : null,
    item.misc_cost ? ['Misc Cost', fmt(item.misc_cost), 'var(--text)'] : null,
    item.purchase_date ? ['Purchase Date', item.purchase_date, 'var(--text)'] : null,
    item.sold_date ? ['Sold Date', item.sold_date, 'var(--text)'] : null,
  ].filter(Boolean);

  $('d-grid').innerHTML = dItems.map(([l,v,c])=>`
    <div class="detail-item">
      <div class="detail-label">${l}</div>
      <div class="detail-value mono" style="color:${c}">${v}</div>
    </div>`).join('');

  // Cost breakdown pill for sold items
  if (item.status==='sold' && item.sold_price) {
    const sp = Number(item.sold_price)||0;
    const cost = Number(item.cost)||0;
    show('d-cost-breakdown');
    $('d-cost-breakdown').innerHTML = `
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Cost Breakdown</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        <span class="cost-pill">Sold <b>${fmt(sp)}</b></span>
        <span class="cost-pill">Cost <b style="color:var(--red)">-${fmt(cost)}</b></span>
        ${pkgAmt?`<span class="cost-pill">Pkg <b style="color:var(--red)">-${fmt(pkgAmt)}</b></span>`:''}
        ${feeAmt?`<span class="cost-pill">Fee <b style="color:var(--red)">-${fmt(feeAmt)}</b></span>`:''}
        ${miscAmt?`<span class="cost-pill">Misc <b style="color:var(--red)">-${fmt(miscAmt)}</b></span>`:''}
        <span class="cost-pill">Net <b style="color:${pl>=0?'var(--green)':'var(--red)'}">${fmtP(pl)}</b></span>
      </div>`;
  } else hide('d-cost-breakdown');

  const catFields = CAT_FIELDS[item.category]||[];
  const extra = item.extra_fields||{};
  const catRows = catFields.map(f=>{
    const v = extra[f.n];
    if(v==null||v==='') return '';
    return `<div class="detail-item"><div class="detail-label">${f.l}</div><div class="detail-value">${f.t==='bool'?(v?'Yes':'No'):esc(v)}</div></div>`;
  }).join('');
  if (catRows) { $('d-cat-label').textContent=(CAT_LABELS[item.category]||item.category)+' Details'; $('d-cat-grid').innerHTML=catRows; show('d-cat-section'); }
  else hide('d-cat-section');

  if (item.notes) { $('d-notes').textContent=item.notes; show('d-notes-section'); } else hide('d-notes-section');
  show('modal-detail');
}

function closeDetail() { hide('modal-detail'); detailItemId=null; }

function editFromDetail() {
  const item = items.find(i=>i.id===detailItemId);
  if(!item) return;
  closeDetail();
  openEditForm(item);
}

async function deleteItem() {
  if (!confirm('Delete this item? This cannot be undone.')) return;
  await db.from('inventory').delete().eq('id',detailItemId);
  items = items.filter(i=>i.id!==detailItemId);
  closeDetail();
  if (currentPage==='dashboard') renderDashboard();
  else if (currentPage==='listed') renderListed();
  else renderInventory();
}

// ── Packaging CRUD ────────────────────────────────────────────────────────────
function openPkgForm() {
  editPkgId = null;
  $('pkg-form-title').textContent = 'Add Packaging';
  ['pkg-f-name','pkg-f-cost','pkg-f-qty','pkg-f-notes'].forEach(id=>setVal(id,''));
  hide('pkg-err');
  show('modal-pkg');
}

function openEditPkg(id) {
  const p = packaging.find(x=>x.id===id);
  if (!p) return;
  editPkgId = id;
  $('pkg-form-title').textContent = 'Edit Packaging';
  setVal('pkg-f-name', p.name);
  setVal('pkg-f-cost', p.unit_cost||'');
  setVal('pkg-f-qty', p.quantity||'');
  setVal('pkg-f-notes', p.notes||'');
  hide('pkg-err');
  show('modal-pkg');
}

function closePkgForm() { hide('modal-pkg'); editPkgId=null; }

async function savePkg() {
  const name = val('pkg-f-name').trim();
  if (!name) { show('pkg-err'); $('pkg-err').textContent='Name is required'; return; }
  $('pkg-save-btn').disabled=true; $('pkg-save-btn').textContent='Saving...';
  const payload = {
    user_id: currentUser.id, name,
    unit_cost: val('pkg-f-cost')||null,
    quantity: val('pkg-f-qty')||null,
    notes: val('pkg-f-notes')||null
  };
  try {
    let res;
    if (editPkgId) {
      res = await db.from('packaging').update(payload).eq('id',editPkgId).select().single();
      packaging = packaging.map(p=>p.id===editPkgId?res.data:p);
    } else {
      res = await db.from('packaging').insert(payload).select().single();
      packaging = [res.data,...packaging];
    }
    if (res.error) throw res.error;
    closePkgForm();
    renderPackaging();
    $('page-title-text').innerHTML = `Packaging <span style="color:var(--text2);font-weight:400;font-size:14px">${packaging.length} items</span>`;
  } catch(e) {
    show('pkg-err'); $('pkg-err').textContent=e.message;
  } finally {
    $('pkg-save-btn').disabled=false; $('pkg-save-btn').textContent='Save';
  }
}

async function deletePkg(id) {
  if (!confirm('Delete this packaging item?')) return;
  await db.from('packaging').delete().eq('id',id);
  packaging = packaging.filter(p=>p.id!==id);
  renderPackaging();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function handleOverlayClick(e, modalId, closeFn) {
  if (e.target === $(modalId)) closeFn();
}

function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function emptyState(icon,title,sub) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
}

init();
</script>
</body>
</html>
